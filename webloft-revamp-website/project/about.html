<link rel="stylesheet" href="styles/tokens.css">
<style>
  @media (max-width: 1100px) {
    .work-grid { grid-template-columns: 1fr !important; }
    .team-grid { grid-template-columns: 1fr !important; }
    .team-grid > div { border-right: none !important; }
    .contact-grid, .manifesto-row { grid-template-columns: 1fr !important; }
    .contact-grid > div:first-child { position: static !important; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .pricing-grid { grid-template-columns: 1fr !important; }
    .pricing-grid > div { border-right: none !important; }
    .process-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .pillars-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .faq-grid, .footer-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 768px) {
    .nav-links { display: none !important; }
    .stats-grid, .process-grid, .pillars-grid, .footer-grid { grid-template-columns: 1fr !important; }
    .stats-grid > div { border-right: none !important; border-bottom: 1px solid var(--line); }
  }
  @media (max-width: 900px) {
    .service-row > div:first-child { grid-template-columns: 60px 1fr auto !important; }
    .service-row > div:first-child > div:nth-child(3) { display: none; }
  }
</style>
</head>
